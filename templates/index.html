<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气穿搭助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            text-align: right;
        }
        .message .bubble {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chat-input {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input input:focus {
            border-color: #667eea;
        }
        .chat-input button {
            margin-left: 10px;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .chat-input button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .weather-result {
            text-align: left;
        }
        .weather-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .weather-card .temp {
            font-size: 3em;
            font-weight: bold;
        }
        .weather-card .condition {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .forecast-list {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
            margin: 10px 0;
        }
        .forecast-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }
        .forecast-item .date {
            font-size: 0.85em;
            opacity: 0.8;
        }
        .forecast-item .temp {
            font-size: 1.1em;
            font-weight: bold;
            margin: 5px 0;
        }
        .outfit-suggestion {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 4px solid #ffd700;
        }
        .outfit-suggestion pre {
            font-family: inherit;
            white-space: pre-wrap;
        }
        .chart-container {
            margin-top: 15px;
            text-align: center;
        }
        .chart-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            background: #f8f8f8;
            border-top: 1px solid #eee;
        }
        .quick-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .typing-indicator {
            display: inline-block;
            padding: 12px 18px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 天气穿搭助手</h1>
            <p>输入城市名，查询天气并获取穿搭建议</p>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="bubble">
您好！我是天气穿搭助手 🌤️

请输入您想查询的城市，比如：
• 北京天气
• 上海怎么样
• 广州穿什么

或者直接输入城市名也可以！
                    </div>
                </div>
            </div>

            <div class="quick-buttons">
                <button class="quick-btn" onclick="sendCity('北京')">北京</button>
                <button class="quick-btn" onclick="sendCity('上海')">上海</button>
                <button class="quick-btn" onclick="sendCity('广州')">广州</button>
                <button class="quick-btn" onclick="sendCity('深圳')">深圳</button>
                <button class="quick-btn" onclick="sendCity('杭州')">杭州</button>
                <button class="quick-btn" onclick="sendCity('成都')">成都</button>
            </div>

            <div class="chat-input">
                <input type="text" id="userInput" placeholder="输入城市名称..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = 'session_' + Date.now();

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendCity(city) {
            document.getElementById('userInput').value = city + '天气';
            sendMessage();
        }

        function addMessage(content, role) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="bubble">${content}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';

            // 添加打字指示器
            addTypingIndicator();

            // 发送请求
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, session_id: sessionId })
            })
            .then(response => response.json())
            .then(data => {
                removeTypingIndicator();
                console.log('Server response:', data);
                displayResponse(data);
            })
            .catch(error => {
                removeTypingIndicator();
                console.error('Request failed:', error);
                addMessage('抱歉，出现错误，请稍后重试。', 'assistant');
            })
            .finally(() => {
                sendBtn.disabled = false;
            });
        }

        function displayResponse(data) {
            if (!data || !data.response) {
                console.error('Invalid response:', data);
                addMessage('抱歉，收到无效响应。', 'assistant');
                return;
            }

            // 直接显示服务器返回的响应
            const formatted = data.response.replace(/\n/g, '<br>');
            addMessage(formatted, 'assistant');
        }
    </script>
</body>
</html>
